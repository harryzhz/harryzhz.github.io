# =============================================================================
# 站点基础配置
# =============================================================================
baseURL: "https://harryzhang.cn/"
languageCode: "zh-CN"
defaultContentLanguage: "zh-cn"
hasCJKLanguage: true

# 主题（通过 Hugo Modules 引入 LoveIt）
module:
  imports:
    - path: "github.com/dillonzq/LoveIt"

# 文章固定链接格式
permalinks:
  posts: "/:year-:month-:day/:slug/"

# =============================================================================
# 分类与标签
# =============================================================================
taxonomies:
  category: "categories"
  tag: "tags"

# =============================================================================
# 输出格式
# =============================================================================
outputs:
  home:
    - HTML
    - RSS
    - JSON  # 搜索功能依赖 JSON 索引
  section:
    - HTML
    - RSS
  taxonomy:
    - HTML
    - RSS

# =============================================================================
# 分页
# =============================================================================
pagination:
  pagerSize: 10

# =============================================================================
# 导航菜单
# =============================================================================
menu:
  main:
    - identifier: "posts"
      name: "Posts"
      url: "/posts/"
      weight: 10
    - identifier: "categories"
      name: "Categories"
      url: "/categories/"
      weight: 20
    - identifier: "tags"
      name: "Tags"
      url: "/tags/"
      weight: 30
    - identifier: "about"
      name: "About"
      url: "/about/"
      weight: 40

# =============================================================================
# 主题参数（LoveIt）
# =============================================================================
params:
  dateFormat: "2006-01-02"

  author:
    name: "Harry"

  # 顶部导航栏
  header:
    desktopMode: "fixed"
    mobileMode: "auto"
    title:
      name: "Harry"
      pre: "<i class='far fa-kiss-wink-heart' aria-hidden='true'></i>"
      typeit: false

  # 底部信息栏
  footer:
    enable: true
    hugo: true
    copyright: true
    author: true

  # 首页配置
  home:
    rss: 10
    profile:
      enable: true
      avatarURL: "/assets/images/avatar.jpeg"
      title: "Harry's Space"
      subtitle: "Agent is all you need."
      typeit: true
      social: true
    posts:
      enable: true
      paginate: 6

  # 搜索（lunr 本地搜索）
  search:
    enable: true
    type: "lunr"
    contentLength: 4000
    placeholder: "搜索"
    maxResultLength: 10
    snippetLength: 30
    highlightTag: "em"
    absoluteURL: false

  # 社交链接
  social:
    GitHub: "harryzhz"
